{% extends "base.html" %}

{% block title %}抓取热点 - RedNote AI{% endblock %}

{% block content %}
<div x-data="fetchPage()">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">📡 抓取热点</h1>
        <p class="text-gray-500 mt-1">从多个信息源抓取 AI 领域热点内容</p>
    </div>

    <!-- 抓取配置 -->
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 mb-6">
        <h2 class="text-lg font-semibold mb-4">选择信息源</h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <label class="flex items-center p-4 border rounded-lg cursor-pointer hover:border-purple-300 transition"
                   :class="selectedSources.includes('arxiv') ? 'border-purple-500 bg-purple-50' : 'border-gray-200'">
                <input type="checkbox" value="arxiv" x-model="selectedSources" class="hidden">
                <span class="text-2xl mr-3">📄</span>
                <div>
                    <p class="font-medium">Arxiv</p>
                    <p class="text-xs text-gray-500">AI 论文</p>
                </div>
            </label>
            
            <label class="flex items-center p-4 border rounded-lg cursor-pointer hover:border-purple-300 transition"
                   :class="selectedSources.includes('github') ? 'border-purple-500 bg-purple-50' : 'border-gray-200'">
                <input type="checkbox" value="github" x-model="selectedSources" class="hidden">
                <span class="text-2xl mr-3">🐙</span>
                <div>
                    <p class="font-medium">GitHub</p>
                    <p class="text-xs text-gray-500">热门项目</p>
                </div>
            </label>
            
            <label class="flex items-center p-4 border rounded-lg cursor-pointer hover:border-purple-300 transition"
                   :class="selectedSources.includes('twitter') ? 'border-purple-500 bg-purple-50' : 'border-gray-200'">
                <input type="checkbox" value="twitter" x-model="selectedSources" class="hidden">
                <span class="text-2xl mr-3">🐦</span>
                <div>
                    <p class="font-medium">Twitter</p>
                    <p class="text-xs text-gray-500">AI 大 V</p>
                </div>
            </label>
            
            <label class="flex items-center p-4 border rounded-lg cursor-pointer hover:border-purple-300 transition"
                   :class="selectedSources.includes('rss') ? 'border-purple-500 bg-purple-50' : 'border-gray-200'">
                <input type="checkbox" value="rss" x-model="selectedSources" class="hidden">
                <span class="text-2xl mr-3">📰</span>
                <div>
                    <p class="font-medium">RSS</p>
                    <p class="text-xs text-gray-500">订阅源</p>
                </div>
            </label>
        </div>
        
        <div class="flex items-center gap-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">抓取数量</label>
                <input type="number" x-model="limit" min="5" max="50" 
                       class="w-24 px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
            </div>
            <button @click="fetchItems()" :disabled="loading || selectedSources.length === 0"
                    class="mt-5 px-6 py-2 bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-lg hover:from-purple-600 hover:to-purple-700 transition disabled:opacity-50">
                <span x-text="loading ? '抓取中...' : '开始抓取'"></span>
            </button>
        </div>
    </div>

    <!-- 抓取结果 -->
    <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100" x-show="items.length > 0">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold">抓取结果 (<span x-text="items.length"></span> 条)</h2>
            <button @click="generateFromItems()" :disabled="generating || selectedItems.length === 0"
                    class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition disabled:opacity-50">
                <span x-text="generating ? '生成中...' : '生成选中内容 (' + selectedItems.length + ')'"></span>
            </button>
        </div>
        
        <div class="space-y-3">
            <template x-for="item in items" :key="item.id">
                <div class="flex items-start p-4 border rounded-lg hover:border-purple-200 transition"
                     :class="selectedItems.includes(item.id) ? 'border-purple-500 bg-purple-50' : 'border-gray-100'">
                    <input type="checkbox" :value="item.id" x-model="selectedItems" class="mt-1 mr-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs px-2 py-0.5 bg-gray-100 rounded" x-text="item.source"></span>
                            <span class="text-xs text-purple-600" x-text="'分数: ' + item.score.toFixed(2)"></span>
                        </div>
                        <h3 class="font-medium text-gray-900" x-text="item.title"></h3>
                        <p class="text-gray-500 text-sm mt-1 line-clamp-2" x-text="item.summary"></p>
                        <a :href="item.url" target="_blank" class="text-xs text-blue-500 hover:underline mt-1 inline-block">查看原文 →</a>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
function fetchPage() {
    return {
        selectedSources: ['arxiv'],
        limit: 20,
        loading: false,
        generating: false,
        items: [],
        selectedItems: [],
        
        async fetchItems() {
            this.loading = true;
            this.items = [];
            this.selectedItems = [];
            
            try {
                const res = await fetch('/api/fetch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sources: this.selectedSources, limit: this.limit })
                });
                const data = await res.json();
                if (data.success) {
                    this.items = data.items;
                }
            } catch (e) {
                alert('抓取失败: ' + e.message);
            } finally {
                this.loading = false;
            }
        },
        
        async generateFromItems() {
            this.generating = true;
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        source: this.selectedSources[0], 
                        limit: this.selectedItems.length,
                        top_n: Math.min(this.selectedItems.length, 5),
                        generate_digest: this.selectedItems.length >= 3
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert(`生成成功！创建了 ${data.count} 篇草稿`);
                    window.location.href = '/drafts';
                }
            } catch (e) {
                alert('生成失败: ' + e.message);
            } finally {
                this.generating = false;
            }
        }
    }
}
</script>
{% endblock %}
