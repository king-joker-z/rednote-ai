{% extends "base.html" %}

{% block title %}发布到小红书 - RedNote AI{% endblock %}

{% block content %}
<div x-data="publishPage()" x-init="loadStatus(); loadDraft()">
    <div class="mb-6">
        <a href="/drafts" class="text-gray-500 hover:text-gray-700 text-sm">← 返回草稿列表</a>
        <h1 class="text-2xl font-bold text-gray-900 mt-2">📤 发布到小红书</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- 左侧：内容预览 -->
        <div class="lg:col-span-2 space-y-6">
            <!-- 草稿预览 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-lg font-semibold mb-4">📝 内容预览</h2>
                <div class="border-l-4 border-purple-500 pl-4">
                    <h3 class="text-xl font-bold" x-text="draft.title"></h3>
                    <p class="text-gray-600 mt-2 whitespace-pre-wrap" x-text="draft.content"></p>
                    <div class="flex flex-wrap gap-2 mt-4">
                        <template x-for="tag in draft.tags" :key="tag">
                            <span class="text-sm text-blue-500" x-text="'#' + tag"></span>
                        </template>
                    </div>
                </div>
            </div>

            <!-- 封面图 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-lg font-semibold mb-4">🖼️ 封面图</h2>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">封面风格</label>
                        <select x-model="coverStyle" class="w-full px-3 py-2 border rounded-lg">
                            <option value="gradient">🎨 渐变风格</option>
                            <option value="tech">💻 科技风格</option>
                            <option value="cute">🌸 可爱风格</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button @click="generateCover()" :disabled="generatingCover"
                                class="w-full px-4 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600 transition disabled:opacity-50">
                            <span x-text="generatingCover ? '生成中...' : '生成封面'"></span>
                        </button>
                    </div>
                </div>
                
                <div x-show="coverImage" class="mt-4">
                    <img :src="coverImage" class="w-full max-w-xs rounded-lg shadow">
                </div>
                
                <div x-show="!coverImage" class="mt-4 p-8 border-2 border-dashed border-gray-200 rounded-lg text-center text-gray-400">
                    点击「生成封面」创建封面图
                </div>
            </div>
        </div>

        <!-- 右侧：发布设置 -->
        <div class="space-y-6">
            <!-- 发布状态 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-lg font-semibold mb-4">🔌 发布能力</h2>
                
                <div class="space-y-3">
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <span class="text-sm">mcporter CLI</span>
                        <span x-text="status.mcporter ? '✅' : '❌'"></span>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <span class="text-sm">小红书 MCP</span>
                        <span x-text="status.mcp_configured ? '✅' : '❌'"></span>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <span class="text-sm">Cookies</span>
                        <span x-text="status.cookies_set ? '✅' : '❌'"></span>
                    </div>
                </div>
                
                <p class="text-xs text-gray-500 mt-3">
                    推荐方式: <span class="font-medium" x-text="status.recommended_method || 'manual'"></span>
                </p>
            </div>

            <!-- 发布方式选择 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-lg font-semibold mb-4">📤 发布方式</h2>
                
                <div class="space-y-3">
                    <label class="flex items-center p-3 border rounded-lg cursor-pointer"
                           :class="publishMethod === 'mcp' ? 'border-purple-500 bg-purple-50' : 'border-gray-200'"
                           x-show="status.mcp_configured">
                        <input type="radio" value="mcp" x-model="publishMethod" class="hidden">
                        <span class="mr-3">🤖</span>
                        <div>
                            <p class="font-medium">MCP 自动发布</p>
                            <p class="text-xs text-gray-500">通过小红书 MCP 服务自动发布</p>
                        </div>
                    </label>
                    
                    <label class="flex items-center p-3 border rounded-lg cursor-pointer"
                           :class="publishMethod === 'browser' ? 'border-purple-500 bg-purple-50' : 'border-gray-200'">
                        <input type="radio" value="browser" x-model="publishMethod" class="hidden">
                        <span class="mr-3">🌐</span>
                        <div>
                            <p class="font-medium">浏览器自动化</p>
                            <p class="text-xs text-gray-500">打开浏览器自动填写内容</p>
                        </div>
                    </label>
                    
                    <label class="flex items-center p-3 border rounded-lg cursor-pointer"
                           :class="publishMethod === 'manual' ? 'border-purple-500 bg-purple-50' : 'border-gray-200'">
                        <input type="radio" value="manual" x-model="publishMethod" class="hidden">
                        <span class="mr-3">✋</span>
                        <div>
                            <p class="font-medium">手动复制</p>
                            <p class="text-xs text-gray-500">复制内容到小红书创作中心</p>
                        </div>
                    </label>
                </div>
            </div>

            <!-- 发布按钮 -->
            <button @click="publish()" :disabled="publishing"
                    class="w-full px-6 py-4 bg-gradient-to-r from-red-500 to-pink-500 text-white rounded-xl hover:from-red-600 hover:to-pink-600 transition shadow-lg disabled:opacity-50 font-semibold text-lg">
                <span x-text="publishing ? '发布中...' : '🚀 发布到小红书'"></span>
            </button>
            
            <p class="text-xs text-center text-gray-400">
                发布前请确认内容无误
            </p>
        </div>
    </div>

    <!-- 手动发布弹窗 -->
    <div x-show="showManualModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-cloak>
        <div class="bg-white rounded-xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold">📋 复制以下内容到小红书</h3>
                <button @click="showManualModal = false" class="text-gray-400 hover:text-gray-600">✕</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">标题</label>
                    <div class="flex">
                        <input type="text" :value="draft.title" readonly class="flex-1 px-3 py-2 border rounded-l-lg bg-gray-50">
                        <button @click="copyToClipboard(draft.title)" class="px-4 py-2 bg-purple-500 text-white rounded-r-lg hover:bg-purple-600">复制</button>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">正文</label>
                    <textarea readonly class="w-full px-3 py-2 border rounded-lg bg-gray-50 h-48" x-text="draft.content + '\n\n' + draft.tags.map(t => '#' + t).join(' ')"></textarea>
                    <button @click="copyToClipboard(draft.content + '\n\n' + draft.tags.map(t => '#' + t).join(' '))" 
                            class="mt-2 px-4 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600 w-full">复制正文</button>
                </div>
            </div>
            
            <div class="mt-6 flex gap-4">
                <a href="https://creator.xiaohongshu.com/publish/publish" target="_blank"
                   class="flex-1 px-4 py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 text-center font-medium">
                    打开创作中心 →
                </a>
                <button @click="showManualModal = false" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                    关闭
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function publishPage() {
    return {
        draft: { title: '', content: '', tags: [], cover_prompt: '' },
        status: {},
        publishMethod: 'manual',
        coverStyle: 'gradient',
        coverImage: null,
        generatingCover: false,
        publishing: false,
        showManualModal: false,
        
        async loadStatus() {
            try {
                const res = await fetch('/api/publish/status');
                const data = await res.json();
                this.status = data.status;
                this.publishMethod = data.status.recommended_method || 'manual';
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        },
        
        async loadDraft() {
            const urlParams = new URLSearchParams(window.location.search);
            const draftId = urlParams.get('draft_id');
            if (!draftId) return;
            
            try {
                const res = await fetch(`/api/drafts/${draftId}`);
                const data = await res.json();
                if (data.success) {
                    this.draft = data.draft;
                }
            } catch (e) {
                console.error('Failed to load draft:', e);
            }
        },
        
        async generateCover() {
            this.generatingCover = true;
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const draftId = urlParams.get('draft_id');
                
                const res = await fetch(`/api/generate-cover/${draftId}?style=${this.coverStyle}`, {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (data.success) {
                    this.coverImage = data.image.path;
                } else {
                    alert('生成失败');
                }
            } catch (e) {
                alert('生成失败: ' + e.message);
            } finally {
                this.generatingCover = false;
            }
        },
        
        async publish() {
            if (this.publishMethod === 'manual') {
                this.showManualModal = true;
                return;
            }
            
            this.publishing = true;
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const draftId = urlParams.get('draft_id');
                
                const res = await fetch('/api/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        draft_id: draftId,
                        method: this.publishMethod,
                        generate_cover: !this.coverImage,
                        cover_style: this.coverStyle
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('发布成功！');
                    window.location.href = '/drafts';
                } else {
                    alert('发布失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('发布失败: ' + e.message);
            } finally {
                this.publishing = false;
            }
        },
        
        copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板');
            });
        }
    }
}
</script>
{% endblock %}
