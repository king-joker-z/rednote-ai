<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RedNote AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="gradient-bg text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-2">
                        <span class="text-2xl">🔥</span>
                        <span class="font-bold text-xl">RedNote AI</span>
                    </a>
                    <div class="hidden md:block ml-10">
                        <div class="flex items-center space-x-4">
                            <a href="/" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/20 transition">首页</a>
                            <a href="/fetch" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/20 transition">抓取</a>
                            <a href="/drafts" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/20 transition">草稿</a>
                            <a href="/settings" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-white/20 transition">设置</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- 底部 -->
    <footer class="bg-white border-t mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-4 text-center text-gray-500 text-sm">
            RedNote AI - AI-powered Xiaohongshu content automation
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
